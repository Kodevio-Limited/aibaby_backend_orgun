version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: aibaby_db

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend


  redis:
    image: redis:7-alpine

    container_name: aibaby_redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend


  django:

    build:
      context: .
      dockerfile: docker/django/Dockerfile

    container_name: aibaby_backend

    restart: unless-stopped

    env_file:
      - .env

    depends_on:

      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    volumes:

      - static_volume:/app/staticfiles

      - media_volume:/app/media

    networks:
      - backend


  celery_worker:

    build:
      context: .
      dockerfile: docker/django/Dockerfile

    container_name: aibaby_worker

    restart: unless-stopped

    command: celery -A config worker -l info

    env_file:
      - .env

    depends_on:
      - django

    networks:
      - backend


  celery_beat:

    build:
      context: .
      dockerfile: docker/django/Dockerfile

    container_name: aibaby_beat

    restart: unless-stopped

    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

    env_file:
      - .env

    depends_on:
      - django

    networks:
      - backend


  nginx:

    image: nginx:1.27-alpine

    container_name: aibaby_nginx

    restart: unless-stopped

    ports:

      - "18100:80"

    volumes:

      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf

      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

      - static_volume:/static

      - media_volume:/media

    depends_on:
      - django

    networks:
      - backend


volumes:

  postgres_data:

  redis_data:

  static_volume:

  media_volume:


networks:

  backend:
